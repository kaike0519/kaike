<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cápsula do Tempo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        <p>Oi, meu nome é Kaike, tenho 16 anos e, por enquanto, ainda não tenho um objetivo de vida bem definido. Mesmo assim, estou me dedicando e tentando descobrir o que realmente quero para o meu futuro. No momento, penso em fazer Engenharia Civil, mas o valor do curso é bem alto, e por isso ainda tenho algumas dúvidas. Como ainda não tenho certeza se é isso mesmo que quero seguir, estou pesquisando outras opções. Espero que, até o 3º ano, eu já tenha decidido o que quero fazer ou, pelo menos, tenha um plano de como chegar lá.</p>
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #4CAF50;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1.2em;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Cápsula do Tempo</h1>
    <p>Escreva sua mensagem pessoal para o futuro!</p>
    <textarea placeholder="Digite seu texto aqui..." required></textarea>
</div>

</body>
</html>
